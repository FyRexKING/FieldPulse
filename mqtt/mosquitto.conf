# Mosquitto configuration for internal MQTT broker
# mTLS enforced on port 8883

listener 8883
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/broker.crt
keyfile /mosquitto/certs/broker.key
require_certificate true
use_identity_as_username true
tls_version tlsv1.2

# Plain MQTT on all interfaces for internal testing
listener 1883
protocol mqtt
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true

# Performance tuning
max_connections -1
message_size_limit 0
